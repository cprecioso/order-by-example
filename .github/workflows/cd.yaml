on:
  workflow_dispatch:
  workflow_call:
  push:
    branches:
      - main

name: Continuous Deployment

jobs:
  build:
    uses: ./.github/workflows/ci.yaml
    secrets: inherit

  release-please:
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with: { release-type: node }

    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}

  publish-npm:
    runs-on: ubuntu-latest

    if: ${{ fromJson(needs.release-please.outputs.releases_created) }}
    needs:
      - build
      - release-please

    environment:
      name: npm
      url: https://www.npmjs.com/package/@cprecioso/order-by-example

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4

      - uses: actions/download-artifact@v8
        with:
          name: package.tgz

      - run: npm publish --provenance --access public package.tgz

  publish-docs:
    runs-on: ubuntu-latest

    if: ${{ fromJson(needs.release-please.outputs.releases_created) }}
    needs:
      - build
      - release-please

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      id-token: write
      pages: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
